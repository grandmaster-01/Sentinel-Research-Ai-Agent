apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-research-api
  labels:
    app: sentinel-research
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-research
  template:
    metadata:
      labels:
        app: sentinel-research
    spec:
      containers:
      - name: sentinel-api
        image: sentinel-research:latest
        imagePullPolicy: Never # For Minikube local image
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: OLLAMA_BASE_URL
          value: "http://host.minikube.internal:11434" # Access host Ollama from Minikube
        - name: OLLAMA_MODEL
          value: "gemma:2b"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-research-service
spec:
  selector:
    app: sentinel-research
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-research-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel-research-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
